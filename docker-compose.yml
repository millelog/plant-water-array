services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}:/data
    environment:
      - DATABASE_URL=sqlite:////data/backend.db
      - CORS_ORIGINS=${CORS_ORIGINS:-https://plants.loganmiller.dev}
    ports:
      - "8321:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.plants.loganmiller.dev}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
