services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - /mnt/nas1/appdata/plant-water-array:/data
    environment:
      - DATABASE_URL=sqlite:////data/backend.db
      - CORS_ORIGINS=${CORS_ORIGINS:-https://plants.loganmiller.dev}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DEPLOY_API_KEY=${DEPLOY_API_KEY}
      - DEVICE_API_KEY=${DEVICE_API_KEY}
    ports:
      - "8321:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://plants-api.loganmiller.dev}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
