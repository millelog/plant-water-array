services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - backend-data:/data
    environment:
      - DATABASE_URL=sqlite:////data/backend.db
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - FIRMWARE_STORAGE_PATH=/data/firmware_storage
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  backend-data:
